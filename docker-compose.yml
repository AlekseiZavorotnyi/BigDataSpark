services:
  postgres:
    image: postgres:15
    container_name: pg
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: bigdata
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./source_data:/source_data
    networks:
      - bigdata_net

  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: ch
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./clickhouse_data:/var/lib/clickhouse
    networks:
      - bigdata_net

  spark:
    image: apache/spark:3.5.1-scala2.12-java11-python3-ubuntu
    container_name: spark
    depends_on:
      - postgres
      - clickhouse
    volumes:
      - .:/opt/spark/work-dir
      - ./source_data:/source_data
    ports:
      - "4040:4040"
      - "8080:8080"
    environment:
      - SPARK_HOME=/opt/spark
      - PYSPARK_PYTHON=python3
    networks:
      - bigdata_net
    command: bash -c "apt-get update && apt-get install -y curl && tail -f /dev/null"

networks:
  bigdata_net:
    driver: bridge